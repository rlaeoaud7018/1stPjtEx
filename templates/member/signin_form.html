<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소방 관제 시스템 - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    {% include 'include/header.html' %}
    {% include 'include/nav.html' %}

    <main class="container my-auto py-5" id="login-container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8 col-sm-10">
                <article class="card card-glass p-4" id="login-card">
                    <h2 class="text-danger fw-bold text-center mb-4 text-uppercase" id="login-card-title">SYSTEM LOGIN</h2>
                    <form action="/member/signin" method="POST" id="login-form">
                        <div class="mb-3">
                            <label for="memberId" class="form-label text-muted">ID (아이디)</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="memberId" name="memberId" required>
                        </div>
                        <div class="mb-4">
                            <label for="memberPw" class="form-label text-muted">Password (비밀번호)</label>
                            <input type="password" class="form-control bg-dark text-light border-secondary" id="memberPw" name="memberPw" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mb-3" id="btn-login-submit">접속하기</button>
                        <div class="text-center">
                            <span class="text-muted small">계정이 없으신가요? </span>
                            <a href="/member/signup_form" class="text-danger text-decoration-none small fw-semibold" id="link-to-join">사용자 등록</a>
                        </div>
                    </form>
                </article>
            </div>
        </div>
    </main>

    {% include 'include/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
