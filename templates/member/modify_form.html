<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소방 관제 시스템 - 정보 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    {% include 'include/header.html' %}
    {% include 'include/nav.html' %}

    <main class="container my-auto py-5" id="modify-container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8 col-sm-10">
                <article class="card card-glass p-4" id="modify-card">
                    <h2 class="text-danger fw-bold text-center mb-4 text-uppercase" id="modify-card-title">MODIFY ACCOUNT</h2>
                    <form action="/member/modify" method="POST" id="modify-form">
                        <div class="mb-3">
                            <label class="form-label text-muted">ID (아이디 - 변경 불가)</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary-subtle"
                                   value="{{ session.get('signinedMemberId') }}" disabled>
                        </div>
                        <div class="mb-3">
                            <label for="memberPw" class="form-label text-muted">New Password (새 비밀번호)</label>
                            <input type="password" class="form-control bg-dark text-light border-secondary"
                                   id="memberPw" name="memberPw" value="{{ member_info.pw }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="memberName" class="form-label text-muted">Name (이름)</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary"
                                   id="memberName" name="memberName" value="{{ member_info.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="memberPhone" class="form-label text-muted">Phone (전화번호)</label>
                            <input type="tel" class="form-control bg-dark text-light border-secondary"
                                   id="memberPhone" name="memberPhone" value="{{ member_info.phone or '' }}"
                                   placeholder="010-0000-0000">
                        </div>
                        <div class="mb-4">
                            <label for="memberEmail" class="form-label text-muted">Email (이메일)</label>
                            <input type="email" class="form-control bg-dark text-light border-secondary"
                                   id="memberEmail" name="memberEmail" value="{{ member_info.email or '' }}"
                                   placeholder="example@email.com">
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mb-3" id="btn-modify-submit">정보 수정 완료</button>
                        <a href="/dashboard/monitor" class="btn btn-outline-secondary w-100 py-2" id="btn-modify-cancel">취소</a>
                    </form>
                </article>
            </div>
        </div>
    </main>

    {% include 'include/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
