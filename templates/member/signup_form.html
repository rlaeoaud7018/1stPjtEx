<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소방 관제 시스템 - 회원 신청</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    {% include 'include/header.html' %}
    {% include 'include/nav.html' %}

    <main class="container my-auto py-5" id="join-container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8 col-sm-10">
                <article class="card card-glass p-4" id="join-card">
                    <h2 class="text-danger fw-bold text-center mb-1 text-uppercase" id="join-card-title">REGISTER SYSTEM USER</h2>
                    <p class="text-center text-muted small mb-4">관리자 승인 후 시스템을 이용할 수 있습니다.</p>
                    <form action="/member/signup" method="POST" id="join-form">
                        <div class="mb-3">
                            <label for="memberId" class="form-label text-muted">ID (아이디)</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary"
                                   id="memberId" name="memberId" required placeholder="영문/숫자">
                        </div>
                        <div class="mb-3">
                            <label for="memberPw" class="form-label text-muted">Password (비밀번호)</label>
                            <input type="password" class="form-control bg-dark text-light border-secondary"
                                   id="memberPw" name="memberPw" required>
                        </div>
                        <div class="mb-3">
                            <label for="memberName" class="form-label text-muted">Name (이름)</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary"
                                   id="memberName" name="memberName" required>
                        </div>
                        <div class="mb-3">
                            <label for="memberPhone" class="form-label text-muted">Phone (전화번호)</label>
                            <input type="tel" class="form-control bg-dark text-light border-secondary"
                                   id="memberPhone" name="memberPhone" placeholder="010-0000-0000">
                        </div>
                        <div class="mb-4">
                            <label for="memberEmail" class="form-label text-muted">Email (이메일)</label>
                            <input type="email" class="form-control bg-dark text-light border-secondary"
                                   id="memberEmail" name="memberEmail" placeholder="example@email.com">
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mb-3" id="btn-join-submit">신청 완료</button>
                        <div class="text-center">
                            <span class="text-muted small">이미 등록된 계정이 있나요? </span>
                            <a href="/member/signin_form" class="text-danger text-decoration-none small fw-semibold" id="link-to-login">로그인 하기</a>
                        </div>
                    </form>
                </article>
            </div>
        </div>
    </main>

    {% include 'include/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
