<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소방 관제 시스템 - 감지 이력 및 통계</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet.js CSS (지도 라이브러리) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- 공통 관제 테마 CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    {% include 'include/header.html' %}
    {% include 'include/nav.html' %}

    <main class="container-fluid py-4" id="history-main-container">
        
        <!-- 페이지 타이틀 -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2 text-uppercase fw-bold border-start border-danger border-4 ps-3" id="history-page-title">
                감지 이력 및 데이터 시각화
            </h1>
            <div class="d-flex gap-2">
                <a href="/dashboard/monitor" class="btn btn-outline-danger" id="btn-monitor-nav">실시간 관제</a>
                <a href="/dashboard/history" class="btn btn-outline-danger active" id="btn-history-nav">감지 이력 및 통계</a>
            </div>
        </header>

        <div class="row g-4">
            <!-- 왼쪽: 화재 감지 통계 그래프 (Chart.js) & 지도 -->
            <section class="col-lg-6 col-md-12">
                <article class="card card-glass mb-4" id="stats-chart-card">
                    <div class="card-header bg-transparent border-bottom border-secondary">
                        <span class="fw-semibold text-danger">📊 화재 / 연기 감지 통계</span>
                    </div>
                    <div class="card-body bg-black" style="min-height: 300px; display: flex; justify-content: center; align-items: center;">
                        <canvas id="fire-trend-chart" style="width: 100%; max-height: 280px;"></canvas>
                    </div>
                </article>

                <article class="card card-glass" id="map-card">
                    <div class="card-header bg-transparent border-bottom border-secondary">
                        <span class="fw-semibold text-danger">🗺️ 소방 드론 / 카메라 작동 위치</span>
                    </div>
                    <div class="card-body p-0 bg-black" style="height: 300px; position: relative;" id="map-container">
                        <div id="map" class="w-100 h-100"></div>
                    </div>
                </article>
            </section>

            <!-- 오른쪽: 상세 감지 이력 조회 목록 -->
            <section class="col-lg-6 col-md-12">
                <article class="card card-glass h-100" id="history-log-card">
                    <div class="card-header bg-transparent border-bottom border-secondary d-flex justify-content-between align-items-center">
                        <h3 class="h5 m-0 text-danger">전체 감지 로그 조회</h3>
                        <button class="btn btn-sm btn-outline-danger" id="btn-clear-logs" onclick="alert('로그 초기화는 데모 버전에서 비활성화되어 있습니다.')">이력 초기화</button>
                    </div>
                    <div class="card-body p-0 overflow-auto" style="max-height: 640px;">
                        <table class="table table-dark table-striped table-hover m-0 align-middle text-center" id="history-table">
                            <thead>
                                <tr>
                                    <th>시간</th>
                                    <th>유형</th>
                                    <th>신뢰도</th>
                                    <th>상세 내역</th>
                                </tr>
                            </thead>
                            <tbody id="history-tbody">
                                <tr id="no-history-row">
                                    <td colspan="4" class="text-muted py-5">화재 감지 내역을 로딩 중이거나 데이터가 없습니다.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </article>
            </section>
        </div>
    </main>

    {% include 'include/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet.js CDN -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/history.js') }}"></script>
</body>
</html>
